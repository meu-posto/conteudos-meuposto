<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
  <title>Formulário de Contato</title>
  <!-- Folha de Estilos Personalizada -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="form-card">
    <h1>Cadastre-se para receber nosso contato</h1>

    <form id="submit-to-google-sheet">
      <div class="form-group">
        <label for="nome">Nome*</label>
        <input type="text" id="nome" name="Nome" required>
      </div>

      <div class="form-group">
        <label for="celular">Celular*</label>
        <div class="phone-container">
          <input type="tel" id="celular" name="Celular" required placeholder="(00) 00000-0000">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email*</label>
        <input type="email" id="email" name="Email" required>
      </div>

      <div class="form-group">
        <label for="empresa">Empresa*</label>
        <input type="text" id="empresa" name="Empresa" required>
      </div>

      <div class="form-group">
        <label for="cargo">Cargo*</label>
        <input type="text" id="cargo" name="Cargo" required>
      </div>

      <p class="privacy-text">
        Ao informar meus dados, eu concordo com a
        <a
          href="https://www.meuposto.app/politica-de-privacidade/">Política
          de Privacidade</a>.
      </p>

      <button type="submit">
        Quero conhecer o Meu Posto
      </button>
    </form>

    <p class="disclaimer">
      Prometemos não utilizar suas informações de contato para enviar qualquer tipo de SPAM
    </p>
  </div>
  <!-- Biblioteca da Máscara (IMask.js) -->
  <script src="https://unpkg.com/imask"></script>
  <script src="script.js"></script>
</body>

</html>
