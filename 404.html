<style>
  body {
    /* margin: 0; */
    /* font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; */
    background: linear-gradient(135deg, #c072f7, #6A0DAD);
    color: #fff;
    /* display: flex;
    justify-content: center;
    align-items: center;*/
    height: 100vh;
  }

  .container {
    margin: 60px auto;
    text-align: center;
    max-width: 600px;
    padding: 20px;
  }

  h1 {
    font-size: 8em;
    margin: 30px 0;
    animation: pulse 2s infinite;
  }

  p {
    font-size: 1.2em;
    margin: 10px 0;
  }

  #return-button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 24px;
    background: #fff;
    color: #1f1c2c;
    text-decoration: none;
    border-radius: 6px;
    transition: background 0.3s;
  }

  a:hover {
    background: #f0f0f0;
  }

  @keyframes pulse {
    0% {
      transform: scale(1);
    }

    50% {
      transform: scale(1.05);
    }

    100% {
      transform: scale(1);
    }
  }
</style>

<div class="container">
  <h1>404</h1>
  <p><strong>Oops! Página não encontrada.</strong></p>
  <p>A página que você procura não existe ou foi movida.</p>
  <a id="return-button" href="{{ site.baseurl }}/">Voltar para a página inicial</a>
</div>
